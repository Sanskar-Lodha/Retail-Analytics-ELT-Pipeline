version: 2

sources:
  - name: raw
    database: RETAIL_ANALYTICS
    schema: RAW

    tables:
      - name: RAW_ORDERS

models:
  - name: orders_stg
    description: Order-level staging model

    columns:
      - name: order_id
        tests:
          - unique
          - not_null

      - name: customer_id
        tests:
          - not_null

      - name: order_date
        tests:
          - not_null

      - name: item_count
        description: Number of distinct items in the order.

      - name: items_total
        description: Sum of paid prices across all items in the order.


  - name: order_items_stg
    description: Items staging model

    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('orders_stg')
                field: order_id

      - name: item_id
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null

      - name: quantity
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null


  - name: order_events_stg
    description: Contains order lifecycle events such as CREATED, PACKED, SHIPPED, DELIVERED, and CANCELLED.

    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('orders_stg')
                field: order_id

      - name: event_name
        tests:
          - not_null

      - name: event_timestamp
        tests:
          - not_null

  - name: customer_dim
    description: One row per customer.

    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

      - name: customer_name
        tests:
          - not_null


  - name: shop_dim
    description: One row per shop.

    columns:
      - name: shop_id
        tests:
          - unique
          - not_null

      - name: shop_name
        tests:
          - not_null


  - name: orders_tier1
    description: Business-ready order reporting table.

    columns:
      - name: order_id
        tests:
          - unique
          - not_null

      - name: customer_id
        tests:
          - not_null

      - name: shop_id
        tests:
          - not_null

      - name: current_status
        tests:
          - not_null


  - name: order_items_tier1
    description: Business-ready order item reporting table.

    columns:
      - name: item_id
        tests:
          - unique
          - not_null

      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('orders_tier1')
                field: order_id

      - name: product_id
        tests:
          - not_null

      - name: quantity
        tests:
          - not_null